version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: geek_denki_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: geekdenki
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:
